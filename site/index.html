<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>suigraph block explorer</title>
  <link rel="stylesheet" href="./assets/styles.css?v=56ab3191d6d4">
  <meta name="suigraph-extra-src" content="./assets/app-extra.js?v=7d6ac7e8e5e6">
  <script src="./assets/app.js?v=8f43ab689932" defer></script>
</head>
<body>

<div class="topbar">
  <a class="logo" href="#/">suigraph block explorer</a>
  <form class="search-wrap" id="searchForm">

    <input id="searchInput" type="search" placeholder="Address / Tx Digest / Checkpoint / Package / Coin Type" enterkeyhint="search" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
    <button type="submit" class="search-btn" title="Search" aria-label="Search"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16" y2="16"/></svg></button>
  </form>
  <nav>
    <a href="#/" data-page="home">Overview</a>
    <div class="nav-dropdown" data-group="network">
      <button type="button" class="nav-trigger" data-action="nav-toggle-dropdown" aria-haspopup="true" aria-expanded="false" aria-label="Network menu">Network</button>
      <div class="dropdown-menu">
        <a href="#/transfers" data-page="transfers" data-action="nav-close-dropdowns">Transfers</a>
        <a href="#/congestion" data-page="congestion" data-action="nav-close-dropdowns">Congestion</a>
        <a href="#/events" data-page="events" data-action="nav-close-dropdowns">Events</a>
        <a href="#/coin" data-page="coin" data-action="nav-close-dropdowns">Coin Search</a>
        <a href="#/protocol" data-page="protocol" data-action="nav-close-dropdowns">Protocol Config</a>
        <a href="#/validators" data-page="validators" data-action="nav-close-dropdowns">Validators</a>
      </div>
    </div>
    <div class="nav-dropdown" data-group="defi">
      <button type="button" class="nav-trigger" data-action="nav-toggle-dropdown" aria-haspopup="true" aria-expanded="false" aria-label="DeFi menu">DeFi</button>
      <div class="dropdown-menu">
        <a href="#/defi-overview" data-page="defi-overview" data-action="nav-close-dropdowns">Overview</a>
        <a href="#/defi-rates" data-page="defi-rates" data-action="nav-close-dropdowns">Lending Rates</a>
        <a href="#/defi-dex" data-page="defi-dex" data-action="nav-close-dropdowns">DEX</a>
        <a href="#/defi-stablecoins" data-page="defi-stablecoins" data-action="nav-close-dropdowns">Stablecoins</a>
        <a href="#/defi-flows" data-page="defi-flows" data-action="nav-close-dropdowns">Volume</a>

      </div>
    </div>

      <button type="button" class="nav-trigger" data-action="nav-toggle-dropdown" aria-haspopup="true" aria-expanded="false" aria-label="Dev Tools menu">Dev Tools</button>
      <div class="dropdown-menu">
        <a href="#/graphql" data-page="graphql" data-action="nav-close-dropdowns">GraphQL Playground</a>
        <a href="#/simulate" data-page="simulate" data-action="nav-close-dropdowns">TX Simulator</a>
      </div>
    </div>
    <a href="#/packages" data-page="packages">Packages</a>
    <a href="#/docs" data-page="docs">Docs</a>
  </nav>
  <button class="nav-hamburger" data-action="nav-toggle-mobile" aria-label="Toggle navigation" aria-expanded="false"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>

  <button id="view-mode-toggle" class="mode-toggle" type="button" data-action="toggle-view-mode" aria-label="Toggle simple/expert view mode">Simple</button>

  <span class="net-badge">Mainnet</span>
  <a href="https://github.com/Evan-Kim2028/suigraph" target="_blank" rel="noopener" class="net-badge" style="text-decoration:none;color:var(--text-dim)" aria-label="View source on GitHub">GitHub</a>
</div>
<div id="perf-tooltip" class="perf-tooltip" role="tooltip" aria-hidden="true"></div>

<div class="main" id="app">
  <div class="loading"><div class="spinner"></div><br>Loading...</div>
</div>
