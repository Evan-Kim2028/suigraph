name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: Setup Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v2

      - name: Validate build outputs and syntax
        run: npm run validate

      - name: Check bundle size
        run: node scripts/check-bundle-size.mjs

      - name: Smoke GQL query compatibility
        run: npm run smoke:gql-queries

      - name: Smoke DeFi math (decimal sanity)
        run: npm run smoke:defi-math

      - name: Smoke address DeFi route
        env:
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: npm run smoke:address

      - name: Smoke tx route
        env:
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: npm run smoke:tx

      - name: Check route perf budgets
        env:
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: npm run check:route-perf

      - name: Update baseline metrics
        run: npm run baseline
