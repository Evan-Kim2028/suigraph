name: Fixture Drift

on:
  workflow_dispatch:
  schedule:
    - cron: '17 9 * * *'
  push:
    branches:
      - main
    paths:
      - .github/workflows/fixtures-drift.yml
      - site/fixtures/**
      - site/package-lock.json
      - site/package.json
      - site/scripts/**
      - site/src/**

permissions:
  contents: read
  issues: write

concurrency:
  group: fixture-drift-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: site
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: Setup Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v2

      - name: Build static bundle
        run: npm run build

      - name: Scan required live fixtures
        if: github.event_name == 'push'
        env:
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: npm run fixtures:scan -- --tier required

      - name: Scan full fixture corpus
        if: github.event_name != 'push'
        env:
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: npm run fixtures:scan

      - name: Write fixture scan report
        if: always()
        env:
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            node scripts/scan-address-fixtures.mjs --tier required --json > fixtures-scan.json || true
          else
            node scripts/scan-address-fixtures.mjs --json > fixtures-scan.json || true
          fi

      - name: Render fixture scan summary
        if: always()
        run: node scripts/render-fixture-scan-summary.mjs fixtures-scan.json > fixtures-scan-summary.md

      - name: Publish fixture scan summary
        if: always()
        run: cat fixtures-scan-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload fixture scan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fixtures-scan-report
          path: site/fixtures-scan.json
          if-no-files-found: warn

      - name: Open or update scheduled fixture drift issue
        if: failure() && github.event_name == 'schedule'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FIXTURE_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node scripts/sync-fixture-drift-issue.mjs --mode open --repo "$GITHUB_REPOSITORY" --report fixtures-scan.json --summary fixtures-scan-summary.md --run-url "$FIXTURE_RUN_URL"

      - name: Close scheduled fixture drift issue on recovery
        if: success() && github.event_name == 'schedule'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FIXTURE_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node scripts/sync-fixture-drift-issue.mjs --mode close --repo "$GITHUB_REPOSITORY" --report fixtures-scan.json --summary fixtures-scan-summary.md --run-url "$FIXTURE_RUN_URL"
